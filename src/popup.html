<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #e6e6e6;
        background: #16181c;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 10px;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 8px 0;
      }
      .muted {
        color: #8b949e;
      }
      .val {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
      .legend {
        margin-top: 12px;
        border-top: 1px solid #2a2e36;
        padding-top: 10px;
      }
      .legend .row {
        margin: 6px 0;
      }
      .swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        margin-right: 8px;
        vertical-align: middle;
      }
      .sw-limit {
        background: rgba(56, 139, 253, 0.95);
      }
      .sw-trigger {
        background: rgba(240, 173, 78, 1);
      }
      .sw-reduce {
        background: rgba(163, 113, 247, 0.95);
      }
      /* toggle */
      .switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 20px;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #3a3f48;
        border-radius: 20px;
        transition: 0.15s;
      }
      .slider:before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 2px;
        top: 2px;
        background: #fff;
        border-radius: 50%;
        transition: 0.15s;
      }
      input:checked + .slider {
        background: #2f81f7;
      }
      input:checked + .slider:before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h1>My-Order Highlighter</h1>

    <div class="row">
      <span>Enabled</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span>Per-level depth bars</span>
      <label class="switch">
        <input type="checkbox" id="barmode" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span>Debug logging</span>
      <label class="switch">
        <input type="checkbox" id="debug" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span class="muted">Wallet</span>
      <span class="val" id="wallet">—</span>
    </div>
    <div class="row">
      <span class="muted">Coin</span>
      <span class="val" id="coin">—</span>
    </div>
    <div class="row">
      <span class="muted">Orders (this coin)</span>
      <span class="val" id="orders">—</span>
    </div>
    <div class="row">
      <span class="muted">Levels highlighted</span>
      <span class="val" id="highlighted">—</span>
    </div>

    <div class="legend">
      <div class="row"><span><span class="swatch sw-limit"></span>Limit</span></div>
      <div class="row"><span><span class="swatch sw-trigger"></span>Trigger / TP-SL</span></div>
      <div class="row"><span><span class="swatch sw-reduce"></span>Reduce-only</span></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
